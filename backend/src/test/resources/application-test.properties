# Test Configuration - H2 in-memory database
# Izolowana baza testowa - nie wplywa na dane produkcyjne
spring.datasource.url=jdbc:h2:mem:testdb;MODE=MySQL;DB_CLOSE_DELAY=-1
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA Configuration for tests
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# JWT - test secret (min 64 bytes for HS512)
app.jwt.secret=testSecretKeyForJwtTokensUsedOnlyInUnitTestsParkovskyiNikitaLab05PASiR!

# GraphQL
spring.graphql.schema.file-extensions=.graphql,.graphqls,.gqls
